name: Cyber Threat Radar

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    env:
      INTEL_TOKEN: ${{ secrets.INTEL_TOKEN }}
      INTEL_CHAT: ${{ secrets.INTEL_CHAT }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests feedparser

      - run: python bots/radar.py

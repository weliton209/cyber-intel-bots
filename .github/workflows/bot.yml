name: Cyber Threat Radar

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  run-radar:
    runs-on: ubuntu-latest

    env:
      INTEL_TOKEN: ${{ secrets.INTEL_TOKEN }}
      INTEL_CHAT: ${{ secrets.INTEL_CHAT }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install requests
          pip install feedparser

      - name: Run radar
        run: |
          echo "Running radar..."
          python bots/radar.py || true

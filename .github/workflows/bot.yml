name: Cyber Intel Bots

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  run-bots:
    runs-on: ubuntu-latest

    env:
      RED_TOKEN: ${{ secrets.RED_TOKEN }}
      RED_CHAT: ${{ secrets.RED_CHAT }}
      BLUE_TOKEN: ${{ secrets.BLUE_TOKEN }}
      BLUE_CHAT: ${{ secrets.BLUE_CHAT }}
      INTEL_TOKEN: ${{ secrets.INTEL_TOKEN }}
      INTEL_CHAT: ${{ secrets.INTEL_CHAT }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Red Team Bot
        run: python bots/redteam.py || true

      - name: Run Blue Team Bot
        run: python bots/blueteam.py || true

      - name: Run Threat Intel Bot
        run: python bots/threatintel.py || true
